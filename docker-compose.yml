version: "3.8"

services:
  openwa:
    build:
      context: .
      dockerfile: Dockerfile
    image: openwa:latest
    env_file:
      - .env
    ports:
      - "55111:55111"
      - "55222:55222"
    environment:
      HOST: "${HOST}"
      FE_PORT: "${FE_PORT}"
      BE_PORT: "${BE_PORT}"
      OPENWA_FRONTEND_URL: "${OPENWA_FRONTEND_URL}"
      OPENWA_BACKEND_URL: "${OPENWA_BACKEND_URL}"
      OPENWA_AUTO_OPEN: "${OPENWA_AUTO_OPEN}"
      OPENWA_USE_WWEBJS: "${OPENWA_USE_WWEBJS}"
      OPENWA_ALLOW_MOCK: "${OPENWA_ALLOW_MOCK}"
      DATABASE_URL: "${DATABASE_URL}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwa.rule=Host(`${OPENWA_DOMAIN}`)"
      - "traefik.http.routers.openwa.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.routers.openwa.tls=${TRAEFIK_TLS}"
      - "traefik.http.services.openwa.loadbalancer.server.port=${FE_PORT}"
    networks:
      - dokploy-network
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
